<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>展覽互動音響系統</title>
    <!-- 引入 MQTT 連線庫 (用於手機與平板之間的極速通訊) -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        /* 全局設定 */
        body {
            font-family: 'PingFang HK', 'Microsoft JhengHei', 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        /* 隱藏區塊用 */
        .hidden { display: none !important; }

        /* --- 1. 首頁選擇畫面 --- */
        #selection-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #2b1a10, #140d08); /* 敦煌深木色/洞穴感 */
        }
        .mode-btn {
            background-color: #8b5a2b; /* 赭石色 */
            color: #f5ebd9;
            border: 1px solid #d4a373;
            padding: 20px 40px;
            font-size: 20px;
            border-radius: 8px;
            margin: 15px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
            letter-spacing: 2px;
        }
        .mode-btn:hover { background-color: #a06b35; transform: scale(1.02); }

        /* --- 2. 平板播放器畫面 (黑色專業風格) --- */
        #player-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0b0705;
        }
        #player-start-btn {
            background-color: #b04a3e; /* 硃砂紅 */
            color: #f5ebd9;
            border: 2px solid #d4a373;
            padding: 30px 60px;
            font-size: 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(176, 74, 62, 0.4);
            animation: pulse 2s infinite;
            letter-spacing: 2px;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(176, 74, 62, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 25px rgba(212, 163, 115, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 15px rgba(176, 74, 62, 0.4); }
        }
        .status-box {
            margin-top: 30px;
            padding: 30px;
            border: 1px solid #5c3a21;
            border-radius: 8px;
            width: 80%;
            max-width: 600px;
            background-color: rgba(92, 58, 33, 0.1);
        }
        #player-status { font-size: 24px; color: #d4a373; margin-bottom: 10px; letter-spacing: 1px; }
        #player-log { font-size: 16px; color: #9a8b7a; }
        .playing-indicator {
            color: #e6c280;
            font-size: 30px;
            font-weight: bold;
            margin-top: 20px;
            letter-spacing: 2px;
        }

        /* --- 3. 手機遙控器畫面 (敦煌主題) --- */
        #remote-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #4a3018, #1f140c); /* 敦煌壁畫底色 */
            padding: 20px;
            box-sizing: border-box;
        }
        .remote-container {
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px solid #8b5a2b;
            padding: 30px 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            margin-top: 20px;
        }
        .theme-title { color: #d4a373; margin-bottom: 10px; font-size: 26px; letter-spacing: 3px; font-weight: normal; }
        .theme-subtitle { color: #bcaaa4; margin-bottom: 30px; font-size: 15px; letter-spacing: 1px; }
        
        .play-btn {
            background-color: #b04a3e; /* 硃砂紅 */
            color: #f5ebd9;
            border: 1px solid #d4a373;
            padding: 18px;
            font-size: 18px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            margin-bottom: 15px;
        }
        .play-btn:active { transform: scale(0.97); background-color: #8c382e; }
        
        .stop-btn {
            background-color: transparent; 
            color: #9a8b7a;
            border: 1px solid #5c3a21;
            padding: 15px;
            font-size: 16px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .stop-btn:active { background-color: rgba(92, 58, 33, 0.3); }

        #remote-status {
            margin-top: 20px;
            font-size: 14px;
            color: #e6c280; /* 泥金色 */
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 6px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- ==================== 1. 選擇模式畫面 ==================== -->
    <div id="selection-screen">
        <h1 style="color: #d4a373; margin-bottom: 40px; letter-spacing: 2px; font-weight: normal;">展覽系統設定</h1>
        <button class="mode-btn" onclick="startMode('player')">進入平板播放模式<br><small style="font-size: 14px; opacity: 0.8;">(請在 Lenovo 平板點擊)</small></button>
        <button class="mode-btn" onclick="startMode('remote')">進入手機遙控模式<br><small style="font-size: 14px; opacity: 0.8;">(觀眾介面預覽)</small></button>
    </div>

    <!-- ==================== 2. 平板播放器畫面 ==================== -->
    <div id="player-screen" class="hidden">
        <h1 style="color: #d4a373; font-weight: normal; letter-spacing: 3px;">音響控制主機</h1>
        <p style="color: #8b5a2b; margin-bottom: 40px; letter-spacing: 1px;">請確保平板已連接藍牙喇叭，並點擊下方按鈕啟動</p>
        
        <!-- 必須由工作人員按一次解鎖音效 -->
        <button id="player-start-btn" onclick="initAudioPlayer()">啟動接收系統</button>
        
        <div id="player-dashboard" class="status-box hidden">
            <div id="player-status">等待連線中...</div>
            <div id="player-log">系統已準備就緒</div>
            <div id="playing-ui" class="playing-indicator hidden">🎶 正在播放樂曲...</div>
        </div>

        <!-- 隱藏的音樂播放器 (3首歌) -->
        <audio id="audio-song1" src="song1.mp3"></audio>
        <audio id="audio-song2" src="song2.mp3"></audio>
        <audio id="audio-song3" src="song3.mp3"></audio>
    </div>

    <!-- ==================== 3. 手機遙控器畫面 ==================== -->
    <div id="remote-screen" class="hidden">
        <div class="remote-container">
            <h1 class="theme-title">✨ 文理書院(香港) <br> 幻舞敦煌 智控霓裳 ✨</h1>
            <p class="theme-subtitle">點擊下方按鈕，聆聽展覽樂曲</p>

            <button class="play-btn" onclick="sendRemoteCommand('play1')">▶️ 播放：歌曲 1</button>
            <button class="play-btn" onclick="sendRemoteCommand('play2')">▶️ 播放：歌曲 2</button>
            <button class="play-btn" onclick="sendRemoteCommand('play3')">▶️ 播放：歌曲 3</button>
            
            <button class="stop-btn" onclick="sendRemoteCommand('stop')">⏹️ 暫停播放</button>

            <div id="remote-status">正在連接展覽網絡...</div>
        </div>
    </div>

    <!-- ==================== 核心 JavaScript 邏輯 ==================== -->
    <script>
        const MQTT_TOPIC = "hk_exhibition/audio_control/dunhuang_8899";
        const MQTT_BROKER = "wss://broker.emqx.io:8084/mqtt";
        let mqttClient = null;

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode');
            if (mode === 'player') {
                startMode('player');
            } else if (mode === 'remote') {
                startMode('remote');
            }
        };

        function startMode(mode) {
            document.getElementById('selection-screen').classList.add('hidden');
            if (mode === 'player') {
                document.getElementById('player-screen').classList.remove('hidden');
            } else if (mode === 'remote') {
                document.getElementById('remote-screen').classList.remove('hidden');
                initRemoteController();
            }
        }

        /* --- 平板播放器邏輯 (Player) --- */
        function initAudioPlayer() {
            // 獲取三首歌的元素
            const audio1 = document.getElementById('audio-song1');
            const audio2 = document.getElementById('audio-song2');
            const audio3 = document.getElementById('audio-song3');
            const allAudios = [audio1, audio2, audio3];
            
            // 解鎖所有歌曲嘅自動播放限制
            allAudios.forEach(audio => {
                audio.play().then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                }).catch(e => console.error("解鎖音效失敗:", e));
            });

            document.getElementById('player-start-btn').classList.add('hidden');
            document.getElementById('player-dashboard').classList.remove('hidden');
            document.getElementById('player-status').innerText = "系統已解鎖，連接雲端中...";

            mqttClient = mqtt.connect(MQTT_BROKER);

            mqttClient.on('connect', function () {
                document.getElementById('player-status').innerText = "已連線！等待觀眾手機指令";
                mqttClient.subscribe(MQTT_TOPIC);
            });

            mqttClient.on('message', function (topic, message) {
                const cmd = message.toString();
                document.getElementById('player-log').innerText = "收到最新指令: " + cmd + " (" + new Date().toLocaleTimeString() + ")";
                
                // 收到任何指令，首先將所有歌停晒，避免重疊
                allAudios.forEach(audio => {
                    audio.pause();
                    audio.currentTime = 0;
                });

                const playingUi = document.getElementById('playing-ui');

                // 根據指令播放對應嘅歌
                if (cmd === "play1") {
                    audio1.play();
                    playingUi.innerText = "🎶 正在播放：歌曲 1...";
                    playingUi.classList.remove('hidden');
                } else if (cmd === "play2") {
                    audio2.play();
                    playingUi.innerText = "🎶 正在播放：歌曲 2...";
                    playingUi.classList.remove('hidden');
                } else if (cmd === "play3") {
                    audio3.play();
                    playingUi.innerText = "🎶 正在播放：歌曲 3...";
                    playingUi.classList.remove('hidden');
                } else if (cmd === "stop") {
                    playingUi.classList.add('hidden');
                }
            });

            // 監聽所有歌曲播完事件
            allAudios.forEach(audio => {
                audio.onended = function() {
                    document.getElementById('playing-ui').classList.add('hidden');
                    document.getElementById('player-log').innerText = "歌曲播放完畢，等待下一次指令";
                };
            });
        }

        /* --- 手機遙控器邏輯 (Remote) --- */
        function initRemoteController() {
            mqttClient = mqtt.connect(MQTT_BROKER);

            mqttClient.on('connect', function () {
                document.getElementById('remote-status').innerText = "系統已準備就緒，請點歌！";
            });

            mqttClient.on('error', function () {
                document.getElementById('remote-status').innerText = "無法連接網絡，請重試。";
            });
        }

        function sendRemoteCommand(cmd) {
            if (mqttClient && mqttClient.connected) {
                mqttClient.publish(MQTT_TOPIC, cmd);
                
                if(cmd.startsWith('play')) {
                    document.getElementById('remote-status').innerText = "指令已發送！請聆聽現場音樂";
                } else {
                    document.getElementById('remote-status').innerText = "音樂已暫停";
                }
                
                setTimeout(() => {
                    document.getElementById('remote-status').innerText = "系統已準備就緒，請點歌！";
                }, 3000);
            } else {
                document.getElementById('remote-status').innerText = "網絡連線異常，請重新整理網頁";
            }
        }
    </script>
</body>
</html>
